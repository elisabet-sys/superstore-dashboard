<style>
:root{--negro:#1A1A1A;--dorado:#C9A46B;--gris-o:#444441;--gris-m:#888780;--gris-c:#D0CFC8;--crema:#F5F2EC;--fondo:#F8F8F6;--blanco:#FFFFFF;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--fondo);color:var(--negro);font-size:15px;}
header{background:var(--negro);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;}
header h1{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:22px;color:var(--blanco);}
header span{font-size:11px;color:var(--gris-m);}
.selector-bar{background:var(--blanco);border-bottom:1px solid var(--gris-c);padding:10px 28px;display:flex;gap:6px;align-items:center;}
.selector-label{font-size:11px;color:var(--gris-m);letter-spacing:.1em;text-transform:uppercase;margin-right:8px;}
.tab{padding:7px 18px;border-radius:3px;font-size:13px;border:1px solid var(--gris-c);background:var(--crema);color:var(--gris-m);cursor:pointer;transition:all .15s;white-space:nowrap;}
.tab:hover{border-color:var(--gris-m);color:var(--negro);}
.tab.active{background:var(--negro);color:var(--blanco);border-color:var(--negro);}
.filtros-bar{background:var(--blanco);border-bottom:1px solid var(--gris-c);padding:8px 28px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.filtros-label{font-size:11px;color:var(--gris-m);letter-spacing:.1em;text-transform:uppercase;margin-right:4px;}
select{padding:5px 12px;border:1px solid var(--gris-c);border-radius:3px;background:var(--crema);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--negro);cursor:pointer;}
select:focus{outline:none;border-color:var(--dorado);}
.filtros-info{font-size:12px;color:var(--gris-m);margin-left:auto;font-style:italic;}
.vista{display:none;padding:24px 28px;}
.vista.active{display:block;}
.seccion-titulo{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;color:var(--negro);margin-bottom:3px;}
.seccion-sub{font-size:13px;color:var(--gris-m);margin-bottom:18px;}
.kpi-row{display:grid;gap:10px;margin-bottom:14px;}
.kpi-row-4{grid-template-columns:repeat(4,1fr);}
.kpi-row-5{grid-template-columns:repeat(5,1fr);}
.kpi{background:var(--blanco);border:1px solid var(--gris-c);border-radius:4px;padding:14px 16px;}
.kpi.alerta{border-color:var(--dorado);border-width:1.5px;}
.kpi-num{font-size:11px;color:var(--gris-m);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.kpi-num.d{color:var(--dorado);}
.kpi-titulo{font-size:13px;color:#555;margin-bottom:8px;line-height:1.3;}
.kpi-valor{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:300;color:var(--negro);line-height:1;margin-bottom:5px;}
.kpi-valor.d{color:var(--dorado);}
.kpi-sub{font-size:12px;color:var(--gris-m);line-height:1.4;}
.kpi-sub.pos{color:#2d7a4a;}
.kpi-alarma{background:var(--blanco);border:2px solid var(--dorado);border-radius:4px;padding:16px 20px;margin-bottom:14px;display:flex;align-items:center;gap:16px;}
.kpi-alarma-barra{width:5px;height:60px;background:var(--dorado);border-radius:3px;flex-shrink:0;}
.kpi-alarma-label{font-size:11px;color:var(--dorado);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.kpi-alarma-valor{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:300;color:var(--negro);margin-bottom:3px;}
.kpi-alarma-desc{font-size:13px;color:var(--gris-m);}
.kpi-alarma-nota{font-size:13px;color:var(--dorado);margin-top:2px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.grid-3{display:grid;grid-template-columns:1.4fr 0.6fr;gap:12px;margin-bottom:12px;}
.grid-2-1{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:12px;}
.panel{background:var(--blanco);border:1px solid var(--gris-c);border-radius:4px;padding:16px;}
.panel.alerta{border-color:var(--dorado);border-width:1.5px;}
.panel.alerta-top{border-top:3px solid var(--dorado);}
.panel-titulo{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:400;color:var(--negro);margin-bottom:2px;}
.panel-sub{font-size:12px;color:var(--gris-m);margin-bottom:3px;}
.panel-nota{font-size:12px;color:var(--dorado);font-style:italic;margin-bottom:10px;}
.tabla{width:100%;border-collapse:collapse;font-size:13px;}
.tabla th{background:var(--negro);color:var(--blanco);padding:7px 10px;text-align:left;font-weight:500;font-size:12px;letter-spacing:.04em;}
.tabla td{padding:7px 10px;border-bottom:1px solid var(--crema);}
.tabla tr:nth-child(even) td{background:var(--crema);}
.tabla .pos{color:#2d7a4a;font-weight:500;}
.tabla .neg{color:var(--dorado);font-weight:500;}
.tabla tr.especial td{background:#FFF8EE;}
.comp-tabla{width:100%;border-collapse:collapse;font-size:13px;}
.comp-tabla th{background:var(--negro);color:var(--blanco);padding:7px 10px;text-align:center;}
.comp-tabla th:first-child{text-align:left;}
.comp-tabla td{padding:7px 10px;border-bottom:1px solid var(--crema);}
.comp-tabla td:first-child{color:var(--gris-m);}
.comp-tabla td.tx{text-align:center;color:var(--dorado);font-weight:500;background:#FFF8EE;}
.comp-tabla td.mi{text-align:center;font-weight:500;}
.proyeccion-numero{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:var(--negro);text-align:center;}
.proyeccion-sub{font-size:11px;color:var(--gris-m);text-align:center;margin-bottom:12px;}
.proy-tabla{width:100%;border-collapse:collapse;font-size:13px;}
.proy-tabla th{background:var(--negro);color:var(--blanco);padding:5px 8px;text-align:left;font-size:12px;}
.proy-tabla td{padding:5px 8px;border-bottom:1px solid var(--crema);}
.proy-tabla td.actual{color:var(--dorado);font-weight:500;text-align:center;}
.proy-tabla td.objetivo{text-align:right;font-weight:500;}
.proy-nota{font-size:11px;color:var(--dorado);font-style:italic;text-align:center;margin-top:8px;}
canvas{max-height:260px;min-height:200px;width:100%!important;}
.canvas-tall{max-height:340px!important;min-height:260px;}
.canvas-xl{max-height:420px!important;min-height:300px;}
#mapa-usa-contenedor svg{max-height:380px!important;height:auto;}
#mapa-usa-contenedor{max-height:380px!important;}
footer{background:var(--negro);padding:10px 28px;display:flex;justify-content:space-between;align-items:center;margin-top:24px;}
footer span{font-size:10px;color:var(--gris-m);}
footer .dot{width:6px;height:6px;border-radius:50%;background:var(--dorado);display:inline-block;margin-right:6px;}
</style>

const NEGRO='#1A1A1A',DORADO='#C9A46B',GRIS_O='#444441',GRIS_M='#888780',GRIS_C='#D0CFC8',CREMA='#F5F2EC';

function fmt$(v){if(v===null||v===undefined)return'$0';v=parseFloat(v);if(Math.abs(v)>=1e6)return`$${(v/1e6).toFixed(2)}M`;if(Math.abs(v)>=1e3)return`$${(v/1e3).toFixed(1)}K`;return`$${v.toFixed(0)}`;}
function fmtPct(v){if(v===null||v===undefined)return'—';return`${parseFloat(v).toFixed(1)}%`;}

const chartDefaults={
  responsive:true,maintainAspectRatio:true,
  plugins:{legend:{labels:{font:{family:'DM Sans',size:11},color:NEGRO,boxWidth:12}},tooltip:{bodyFont:{family:'DM Sans'},titleFont:{family:'DM Sans'}}},
  scales:{x:{ticks:{font:{family:'DM Sans',size:10},color:GRIS_M},grid:{color:GRIS_C,lineWidth:.4}},y:{ticks:{font:{family:'DM Sans',size:10},color:GRIS_M},grid:{color:GRIS_C,lineWidth:.4}}}
};

const charts={};
function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}

function getFiltros(){
  return{
    anio:document.getElementById('f-anio').value||'todos',
    region:document.getElementById('f-region').value||'todas',
    categoria:document.getElementById('f-categoria').value||'todas',
    segmento:document.getElementById('f-segmento').value||'todos',
  };
}

function getDatos(){
  const f=getFiltros();
  const clave=`${f.anio}|${f.region}|${f.categoria}|${f.segmento}`;
  return FILTROS[clave]||FILTROS['todos|todas|todas|todos'];
}

function anyFilter(){
  const f=getFiltros();
  return f.anio!=='todos'||f.region!=='todas'||f.categoria!=='todas'||f.segmento!=='todos';
}

function filterLabel(){
  const f=getFiltros();
  return[f.anio!=='todos'?f.anio:null,f.region!=='todas'?f.region:null,
         f.categoria!=='todas'?f.categoria:null,f.segmento!=='todos'?f.segmento:null]
    .filter(Boolean).join(' · ');
}

function cambiarVista(idx){
  document.querySelectorAll('.vista').forEach((v,i)=>v.classList.toggle('active',i===idx));
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  requestAnimationFrame(()=>setTimeout(()=>renderVista(idx),80));
}

function aplicarFiltros(){
  const vista=[...document.querySelectorAll('.vista')].findIndex(v=>v.classList.contains('active'));
  renderVista(vista);
}

function renderVista(idx){
  if(idx===0)renderV1();
  else if(idx===1)renderV2();
  else if(idx===2)renderV3();
  else if(idx===3)renderV4();
  else if(idx===4)renderV5();
}

function setHTML(id,html){const el=document.getElementById(id);if(el)el.innerHTML=html;}
function setText(id,txt){const el=document.getElementById(id);if(el)el.textContent=txt;}

function kpiCard(num,titulo,valor,sub1,sub2,alerta){
  return`<div class="kpi${alerta?' alerta':''}">
    <div class="kpi-num${alerta?' d':''}">${num}</div>
    <div class="kpi-titulo">${titulo}</div>
    <div class="kpi-valor${alerta?' d':''}">${valor}</div>
    ${sub1?`<div class="kpi-sub${alerta?'':' '}">${sub1}</div>`:''}
    ${sub2?`<div class="kpi-sub">${sub2}</div>`:''}
  </div>`;
}

function panelChart(id,titulo,sub,nota,extraClass){
  return`<div class="panel${extraClass?' '+extraClass:''}">
    <div class="panel-titulo">${titulo}</div>
    ${sub?`<div class="panel-sub">${sub}</div>`:''}
    ${nota?`<div class="panel-nota">${nota}</div>`:''}
    <canvas id="${id}"${extraClass&&extraClass.includes('tall')?' class="canvas-tall"':''}${extraClass&&extraClass.includes('xl')?' class="canvas-xl"':''}></canvas>
  </div>`;
}


// ── MAPA SVG USA con D3 + TopoJSON oficial ───────────────────────────
function renderMapa(){
  const _filtDatos = getDatos();
  const PROFIT = (_filtDatos && _filtDatos.estados_profit && Object.keys(_filtDatos.estados_profit).length > 0)
    ? _filtDatos.estados_profit
    : {"Alabama": 5787, "Arizona": -3428, "Arkansas": 4009, "California": 76381, "Colorado": -6528, "Connecticut": 3511, "Delaware": 9977, "District of Columbia": 1060, "Florida": -3399, "Georgia": 16250, "Idaho": 827, "Illinois": -12608, "Indiana": 18383, "Iowa": 1184, "Kansas": 836, "Kentucky": 11200, "Louisiana": 2196, "Maine": 454, "Maryland": 7031, "Massachusetts": 6786, "Michigan": 24463, "Minnesota": 10823, "Mississippi": 3173, "Missouri": 6436, "Montana": 1833, "Nebraska": 2037, "Nevada": 3317, "New Hampshire": 1707, "New Jersey": 9773, "New Mexico": 1157, "New York": 74039, "North Carolina": -7491, "North Dakota": 230, "Ohio": -16971, "Oklahoma": 4854, "Oregon": -1190, "Pennsylvania": -15560, "Rhode Island": 7286, "South Carolina": 1769, "South Dakota": 395, "Tennessee": -5342, "Texas": -25729, "Utah": 2547, "Vermont": 2245, "Virginia": 18598, "Washington": 33403, "West Virginia": 186, "Wisconsin": 8402, "Wyoming": 100};
  const contenedor = document.getElementById('mapa-usa-contenedor');
  if(!contenedor) return;

  if(typeof d3 === 'undefined' || typeof topojson === 'undefined'){
    contenedor.innerHTML = '<div style="padding:20px;color:#888;font-size:12px;text-align:center">Cargando mapa...</div>';
    setTimeout(renderMapa, 300);
    return;
  }

  const min_p = Math.min(...Object.values(PROFIT).filter(v=>v<0));
  const max_p = Math.max(...Object.values(PROFIT).filter(v=>v>0));

  function getColor(name){
    const v = PROFIT[name];
    if(v === undefined) return '#E8E6DC';
    if(v < 0){
      const t = Math.min(1, Math.abs(v) / Math.abs(min_p));
      return `rgb(${Math.round(249-48*t)},${Math.round(225-61*t)},${Math.round(183-76*t)})`;
    } else {
      const t = Math.min(1, v / max_p);
      const c = Math.round(215 - 189*t);
      return `rgb(${c},${c},${c})`;
    }
  }

  function fmtP(v){
    if(v===undefined) return 'Sin datos';
    return Math.abs(v)>=1000 ? `$${(v/1000).toFixed(1)}K` : `$${v}`;
  }

  // Dimensiones fijas — el SVG es responsive via viewBox + width:100%
  const W2 = 960;
  const H2 = 500;

  // Limpiar contenedor completamente
  contenedor.innerHTML = '';
  contenedor.style.position = 'relative';

  // Tooltip — posicionado con coordenadas de página, no del SVG
  const tooltip = document.createElement('div');
  tooltip.style.cssText = 'position:fixed;background:rgba(26,26,26,0.92);color:#fff;' +
    'padding:6px 12px;border-radius:3px;font-size:12px;font-family:DM Sans,sans-serif;' +
    'pointer-events:none;display:none;z-index:9999;white-space:nowrap;' +
    'box-shadow:0 2px 8px rgba(0,0,0,0.3);';
  document.body.appendChild(tooltip);

  const svg = d3.select(contenedor).append('svg')
    .attr('viewBox', `0 0 ${W2} ${H2}`)
    .attr('width', '100%')
    .attr('height', 'auto')
    .attr('preserveAspectRatio', 'xMidYMid meet')
    .style('background', '#F8F8F6')
    .style('border-radius', '4px')
    .style('display', 'block');

  const projection = d3.geoAlbersUsa()
    .scale(W2 * 1.25)
    .translate([W2/2, H2/2]);

  const path = d3.geoPath().projection(projection);

  const FIPS = {"01":"Alabama","02":"Alaska","04":"Arizona","05":"Arkansas","06":"California",
    "08":"Colorado","09":"Connecticut","10":"Delaware","11":"District of Columbia","12":"Florida",
    "13":"Georgia","15":"Hawaii","16":"Idaho","17":"Illinois","18":"Indiana","19":"Iowa",
    "20":"Kansas","21":"Kentucky","22":"Louisiana","23":"Maine","24":"Maryland",
    "25":"Massachusetts","26":"Michigan","27":"Minnesota","28":"Mississippi","29":"Missouri",
    "30":"Montana","31":"Nebraska","32":"Nevada","33":"New Hampshire","34":"New Jersey",
    "35":"New Mexico","36":"New York","37":"North Carolina","38":"North Dakota","39":"Ohio",
    "40":"Oklahoma","41":"Oregon","42":"Pennsylvania","44":"Rhode Island","45":"South Carolina",
    "46":"South Dakota","47":"Tennessee","48":"Texas","49":"Utah","50":"Vermont",
    "51":"Virginia","53":"Washington","54":"West Virginia","55":"Wisconsin","56":"Wyoming"};

  const CRITICOS = ['Texas','Illinois'];

  d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json').then(us => {
    const features = topojson.feature(us, us.objects.states).features;

    svg.selectAll('path')
      .data(features)
      .join('path')
      .attr('d', path)
      .attr('fill', d => getColor(FIPS[String(d.id).padStart(2,'0')]))
      .attr('stroke', d => CRITICOS.includes(FIPS[String(d.id).padStart(2,'0')]) ? '#C9A46B' : '#F8F8F6')
      .attr('stroke-width', d => CRITICOS.includes(FIPS[String(d.id).padStart(2,'0')]) ? 2.5 : 0.8)
      .attr('opacity', 0.95)
      .attr('cursor', 'pointer')
      .on('mouseenter', function(event, d){
        const name   = FIPS[String(d.id).padStart(2,'0')];
        const profit = PROFIT[name];
        // Resaltar estado
        d3.select(this).attr('opacity', 0.75).attr('stroke-width',
          CRITICOS.includes(name) ? 3 : 1.5);
        // Mostrar tooltip con posición fija en pantalla
        tooltip.innerHTML = `<b>${name || 'Desconocido'}</b> &nbsp;·&nbsp; ${fmtP(profit)}`;
        tooltip.style.display = 'block';
        tooltip.style.left = (event.clientX + 16) + 'px';
        tooltip.style.top  = (event.clientY - 36) + 'px';
      })
      .on('mousemove', function(event){
        // Actualizar posición al mover dentro del estado
        tooltip.style.left = (event.clientX + 16) + 'px';
        tooltip.style.top  = (event.clientY - 36) + 'px';
      })
      .on('mouseleave', function(event, d){
        const name = FIPS[String(d.id).padStart(2,'0')];
        // Restaurar estado
        d3.select(this).attr('opacity', 0.95).attr('stroke-width',
          CRITICOS.includes(name) ? 2.5 : 0.8);
        // Ocultar tooltip
        tooltip.style.display = 'none';
      });

    // Etiquetas estados clave
    const KEY = ['California','Texas','Illinois','New York','Michigan','Ohio'];
    features.filter(d => KEY.includes(FIPS[String(d.id).padStart(2,'0')])).forEach(d => {
      const name   = FIPS[String(d.id).padStart(2,'0')];
      const profit = PROFIT[name];
      const c      = path.centroid(d);
      if(!c || isNaN(c[0])) return;
      const isDark = profit > 30000;
      const isLoss = profit < 0;
      const tc     = isDark ? '#fff' : (isLoss ? '#C9A46B' : '#1A1A1A');
      const label  = name === 'New York' ? 'NY' : name.split(' ')[0];
      svg.append('text').attr('x',c[0]).attr('y',c[1]-4)
        .attr('text-anchor','middle').attr('font-size',10)
        .attr('font-family','DM Sans,sans-serif').attr('font-weight','700')
        .attr('fill',tc).attr('pointer-events','none').text(label);
      svg.append('text').attr('x',c[0]).attr('y',c[1]+9)
        .attr('text-anchor','middle').attr('font-size',9)
        .attr('font-family','DM Sans,sans-serif').attr('fill',tc)
        .attr('pointer-events','none').text(fmtP(profit));
    });

    // Leyenda
    const leg = svg.append('g').attr('transform', `translate(16, ${H2-24})`);
    [['rgb(249,225,183)','Pérdida leve'],['rgb(201,164,107)','Pérdida alta'],
     ['rgb(180,180,180)','Profit bajo'],['rgb(80,80,80)','Profit alto'],
     ['rgb(26,26,26)','Profit máx.']].forEach(([col,lbl],i) => {
      leg.append('rect').attr('x',i*105).attr('y',0).attr('width',11).attr('height',9).attr('fill',col);
      leg.append('text').attr('x',i*105+15).attr('y',9).attr('font-size',9)
        .attr('fill','#888780').attr('font-family','DM Sans,sans-serif').text(lbl);
    });

    // Limpiar tooltip al salir del panel completo
    contenedor.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });

  }).catch(() => {
    contenedor.innerHTML = '<div style="padding:20px;color:#888;font-size:12px;text-align:center">' +
      'Mapa no disponible · requiere conexión a internet</div>';
  });
}

    ?`${fl}${d.ventas} ventas · ${d.profit} profit · margen ${d.margen}`

  const minReg=regLabels[d.regional_profit.indexOf(Math.min(...d.regional_profit))];
  const maxReg=regLabels[d.regional_profit.indexOf(Math.max(...d.regional_profit))];

  const f=getFiltros();

        <div style="font-size:13px;line-height:1.8;margin:6px 0">Consumer $224<br>Corporate $234<br>Home Office $241</div>

      ${kpiCard('KPI 22','Retención anual','87%','693 activos / 793 totales','2018: solo 11 clientes nuevos',false)}
    </div>
    <div class="grid-2">
      <div class="panel">
        <div class="panel-titulo">Curva de concentración de profit · Pareto</div>
        <div class="panel-sub">20% de clientes (158) generan el 81% del Profit · concentración extrema — la curva se aleja mucho de la diagonal</div>
        <canvas id="chart-v5-pareto"></canvas>
      </div>
      <div class="panel alerta">
        <div class="panel-titulo">Clientes deficitarios por región</div>
        <div class="panel-nota">Central y East tienen los mismos clientes déficit (128) pero Central genera 11 veces más pérdida · el cliente no es el problema</div>
        <canvas id="chart-v5-deficit"></canvas>
        <div style="background:var(--crema);border-radius:3px;padding:8px;margin-top:10px;font-size:12px;color:var(--gris-m);">
          West tiene 120 clientes deficitarios pero solo -$2.673 de pérdida.<br>
          Central tiene 128 pero genera -$30.114 · <strong style="color:var(--dorado)">11 veces más pérdida</strong> con los mismos clientes.
        </div>
      </div>
    </div>
    <div class="grid-2-1">
      <div class="panel">
        <div class="panel-titulo">Top clientes por profit · no por ventas</div>
        <div class="panel-sub">Sean Miller: mayor gasto del dataset ($25K) pero genera -$1.981 de pérdida · compra Machines con 70% de Discount</div>
        <table class="tabla">
          <thead><tr><th>Cliente</th><th>Pedidos</th><th>Ventas</th><th>Profit</th></tr></thead>
          <tbody id="tabla-clientes"></tbody>
        </table>
      </div>
      <div class="panel">
        <div class="panel-titulo">Retención de clientes · evolución anual</div>
        <div class="panel-sub">En 2018: solo 11 clientes nuevos pero 693 activos · retención excelente sin Discount agresivo</div>
        <canvas id="chart-v5-retencion"></canvas>
      </div>
    </div>`;

  const ctx1=document.getElementById('chart-v5-pareto').getContext('2d');
  charts['v5-pareto']=new Chart(ctx1,{type:'line',data:{labels:D.pareto.cliente_pct,datasets:[
    {label:'Curva Pareto',data:D.pareto.profit_acum_pct,borderColor:NEGRO,borderWidth:2,pointRadius:0,fill:false,tension:.3},
    {label:'Igualdad perfecta',data:D.pareto.cliente_pct.map(x=>x),borderColor:GRIS_C,borderWidth:1,pointRadius:0,fill:false,borderDash:[4,3]}
  ]},options:{...chartDefaults,plugins:{...chartDefaults.plugins,tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.raw.toFixed(1)}%`}}},
    scales:{x:{...chartDefaults.scales.x,title:{display:true,text:'% clientes acumulados',color:GRIS_M,font:{family:'DM Sans',size:10}},ticks:{...chartDefaults.scales.x.ticks,callback:v=>v+'%',maxTicksLimit:6}},
      y:{...chartDefaults.scales.y,title:{display:true,text:'% profit acumulado',color:GRIS_M,font:{family:'DM Sans',size:10}},ticks:{...chartDefaults.scales.y.ticks,callback:v=>v+'%'}}}}
  });

  const colDef=D.deficit_region.labels.map(r=>r==='Central'?DORADO:NEGRO);
  const ctx2=document.getElementById('chart-v5-deficit').getContext('2d');
  charts['v5-deficit']=new Chart(ctx2,{type:'bar',data:{labels:D.deficit_region.labels,datasets:[
    {label:'Pérdida total ($)',data:D.deficit_region.perdida,backgroundColor:colDef,borderRadius:3,barPercentage:.6}
  ]},options:{...chartDefaults,plugins:{...chartDefaults.plugins,legend:{display:false},tooltip:{callbacks:{label:ctx=>`Pérdida: ${fmt$(ctx.raw)} · ${D.deficit_region.n[ctx.dataIndex]} clientes déficit`}}},
    scales:{x:{...chartDefaults.scales.x},y:{...chartDefaults.scales.y,ticks:{...chartDefaults.scales.y.ticks,callback:v=>fmt$(v)}}}}
  });

  document.getElementById('tabla-clientes').innerHTML=D.top_clientes.map((c,i)=>{
    const cls=c.profit<0?'especial':'';
    return`<tr class="${cls}"><td>${c.nombre}${i===D.top_clientes.length-1?' ⚠':''}</td><td style="text-align:center">${c.pedidos}</td><td>${fmt$(c.ventas)}</td><td class="${c.profit<0?'neg':'pos'}">${fmt$(c.profit)}</td></tr>`;
  }).join('');

  const ctx3=document.getElementById('chart-v5-retencion').getContext('2d');
  charts['v5-retencion']=new Chart(ctx3,{type:'bar',data:{labels:D.retencion.map(r=>r.year),datasets:[
    {label:'Clientes activos',data:D.retencion.map(r=>r.activos),backgroundColor:NEGRO,borderRadius:3,barPercentage:.5},
    {label:'Clientes nuevos',data:D.retencion.map(r=>r.nuevos),backgroundColor:DORADO,borderRadius:3,barPercentage:.5}
  ]},options:{...chartDefaults,plugins:{...chartDefaults.plugins,tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.raw}`}}},
    scales:{x:{...chartDefaults.scales.x},y:{...chartDefaults.scales.y}}}
  });
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  renderV1();
  window.addEventListener('resize',()=>{Object.values(charts).forEach(c=>{try{c.resize();}catch(e){}});});
});
</script>
</body>
</html>
